<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        #loading {
            font-size: 20px;
            font-weight: 500;
        }
        #message {
            display: none;
            font-size: 18px;
            text-align: center;
            padding: 20px;
            line-height: 1.5;
            max-width: 340px;
        }
        #message a {
            color: var(--tg-theme-link-color, #2481cc);
        }
    </style>
</head>
<body>
    <div id="loading">Загрузка...</div>
    <div id="message"></div>

    <script>
        function redirectToBot() {
            const username = 'celbretubot';
            const httpsLink = `https://t.me/${username}`;
            const tgLink = `tg://resolve?domain=${username}`;

            // 1. Официальный метод
            if (Telegram.WebApp.openTelegramLink) {
                Telegram.WebApp.openTelegramLink(httpsLink);
            }

            // 2. Лучший метод для iOS
            setTimeout(() => {
                window.location.href = tgLink;
            }, 180);

            // 3. Запасной метод
            setTimeout(() => {
                const a = document.createElement('a');
                a.href = httpsLink;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }, 450);

            // 4. Последний шанс
            setTimeout(() => {
                window.location.href = httpsLink;
            }, 750);
        }

        function init() {
            const loadingDiv = document.getElementById('loading');
            const messageDiv = document.getElementById('message');

            // Проверка поддержки Mini Apps
            if (typeof Telegram === 'undefined' || !Telegram.WebApp) {
                setTimeout(() => {
                    loadingDiv.style.display = 'none';
                    messageDiv.innerHTML = `
                        Ваша версия Telegram не поддерживает Mini Apps.<br><br>
                        Перейдите в бота самостоятельно: 
                        <a href="https://t.me/celbretubot">t.me/celbretubot</a>
                    `;
                    messageDiv.style.display = 'block';
                }, 1000);
                return;
            }

            const webApp = Telegram.WebApp;
            webApp.ready();
            webApp.expand();

            const startParam = webApp.initDataUnsafe?.start_param || '';

            if (startParam === 'start') {
                redirectToBot();
                
                // Закрываем Mini App
                setTimeout(() => {
                    webApp.close();
                }, 1300);
            } else {
                loadingDiv.style.display = 'none';
                messageDiv.innerHTML = 'В приложении проводятся технические работы.<br>Пожалуйста, попробуйте позже.';
                messageDiv.style.display = 'block';
            }
        }

        // Запуск
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
