<script>
    function redirectToBot(webApp) {
        const username = 'celbretubot';
        const httpsLink = `https://t.me/${username}`;

        // Используем ТОЛЬКО официальный нативный метод Telegram
        if (webApp.openTelegramLink) {
            webApp.openTelegramLink(httpsLink);
            
            // Закрываем Mini App после небольшой задержки, 
            // чтобы нативный переход гарантированно успел начаться
            setTimeout(() => {
                webApp.close();
            }, 500); 
        } else {
            // Резервный вариант на случай непредвиденных сбоев API
            window.location.href = httpsLink;
        }
    }

    function init() {
        const loadingDiv = document.getElementById('loading');
        const messageDiv = document.getElementById('message');

        // Проверка поддержки Mini Apps
        if (typeof Telegram === 'undefined' || !Telegram.WebApp) {
            setTimeout(() => {
                loadingDiv.style.display = 'none';
                messageDiv.innerHTML = `
                    Ваша версия Telegram не поддерживает Mini Apps.<br><br>
                    Перейдите в бота самостоятельно: 
                    <a href="https://t.me/celbretubot">t.me/celbretubot</a>
                `;
                messageDiv.style.display = 'block';
            }, 500); // Уменьшил задержку для лучшего UX
            return;
        }

        const webApp = Telegram.WebApp;
        webApp.ready();
        webApp.expand();

        const startParam = webApp.initDataUnsafe?.start_param || '';

        if (startParam === 'start') {
            redirectToBot(webApp);
        } else {
            loadingDiv.style.display = 'none';
            messageDiv.innerHTML = 'В приложении проводятся технические работы.<br>Пожалуйста, попробуйте позже.';
            messageDiv.style.display = 'block';
        }
    }

    // Запуск
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
