<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    
    <!-- Подключаем SDK строго СИНХРОННО и в самом верху head -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            -webkit-user-select: none;
            user-select: none;
        }
        #status-node {
            font-size: 18px;
            text-align: center;
            padding: 20px;
            line-height: 1.5;
            max-width: 320px;
            font-weight: 500;
        }
        #status-node a {
            color: var(--tg-theme-link-color, #2481cc);
            text-decoration: none;
            border-bottom: 1px solid currentColor;
        }
    </style>
</head>
<body>

    <div id="status-node">Загрузка...</div>

    <script>
        // Имя ТВОЕГО ОСНОВНОГО БОТА, куда нужно перенаправить пользователя
        const MAIN_BOT_USERNAME = 'celbretubot'; 

        function updateStatus(htmlContent) {
            document.getElementById('status-node').innerHTML = htmlContent;
        }

        function executeRedirect(webApp) {
            const httpsLink = `https://t.me/${MAIN_BOT_USERNAME}`;
            const tgLink = `tg://resolve?domain=${MAIN_BOT_USERNAME}`;

            updateStatus('Перенаправление в бота...');

            // 1. Основной нативный метод Telegram (работает на iOS, Android, Desktop)
            if (webApp.openTelegramLink) {
                try {
                    webApp.openTelegramLink(httpsLink);
                } catch (e) {
                    console.error("Native redirect failed, trying fallbacks");
                }
            }

            // 2. Первый каскад (для Web-версий Telegram и некоторых ПК клиентов)
            window.location.href = tgLink;

            // 3. Второй каскад (для кастомных старых модов, которые игнорируют tg:// схемы)
            setTimeout(() => {
                window.location.replace(httpsLink);
            }, 150);

            // 4. Третий каскад: если всё совсем плохо (редчайшие форки), даем юзеру прямую ссылку
            setTimeout(() => {
                updateStatus(`Если перенаправление не произошло, <br><br> <a href="${httpsLink}" target="_blank">нажмите сюда для перехода</a>`);
            }, 1500);

            // Закрываем миниапп чуть позже, чтобы цепочка успела сработать
            setTimeout(() => {
                webApp.close();
            }, 2500);
        }

        function initMiniApp() {
            // Защита: если открыли просто в браузере вне Telegram
            if (!window.Telegram || !window.Telegram.WebApp || !window.Telegram.WebApp.initData) {
                const webLink = `https://t.me/${MAIN_BOT_USERNAME}`;
                updateStatus(`Приложение доступно только внутри Telegram.<br><br><a href="${webLink}">Открыть бота</a>`);
                return;
            }

            const tg = window.Telegram.WebApp;
            
            // Сигнализируем Telegram, что страница загружена (убирает лоадер телеграма)
            tg.ready();
            tg.expand();

            // Извлекаем start_param (ключ после ?startapp=)
            const startParam = tg.initDataUnsafe?.start_param || '';

            if (startParam === 'start') {
                executeRedirect(tg);
            } else {
                // Если ключа "start" нет или он другой — жестко показываем техработы
                updateStatus('В приложении проводятся технические работы.<br>Пожалуйста, попробуйте позже.!');
            }
        }

        // Запуск сразу после готовности DOM дерева
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initMiniApp);
        } else {
            initMiniApp();
        }
    </script>
</body>
</html>
