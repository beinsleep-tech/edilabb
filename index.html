<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        #loading {
            font-size: 20px;
            font-weight: 500;
        }
        #message {
            display: none;
            font-size: 18px;
            text-align: center;
            padding: 20px;
            line-height: 1.5;
            max-width: 340px;
        }
        #message a {
            color: var(--tg-theme-link-color, #2481cc);
        }
    </style>
</head>
<body>

    <div id="loading">Загрузка...</div>
    <div id="message"></div>

    <script>
        const MAIN_BOT_USERNAME = 'celbretubot';
        const httpsLink = `https://t.me/${MAIN_BOT_USERNAME}`;
        const tgLink = `tg://resolve?domain=${MAIN_BOT_USERNAME}`;

        function redirectToBot(webApp) {
            // 1. Нативный метод из доков (для официальных клиентов)
            if (webApp && webApp.openTelegramLink) {
                try {
                    webApp.openTelegramLink(httpsLink);
                } catch (e) {}
            }

            // 2. Быстрый вызов deep-link (для iOS, Android-модов и Desktop)
            window.location.href = tgLink;

            // 3. Фолбек-спам через мелкие интервалы, чтобы пробить подвисшие WebView
            setTimeout(() => {
                window.location.href = tgLink;
            }, 120);

            setTimeout(() => {
                window.location.replace(httpsLink);
            }, 300);

            setTimeout(() => {
                window.location.href = httpsLink;
            }, 600);
        }

        function init() {
            const loadingDiv = document.getElementById('loading');
            const messageDiv = document.getElementById('message');

            // Если открыли вне Telegram
            if (typeof Telegram === 'undefined' || !Telegram.WebApp || !window.Telegram.WebApp.initData) {
                loadingDiv.style.display = 'none';
                messageDiv.innerHTML = `
                    Приложение доступно только внутри Telegram.<br><br>
                    <a href="${httpsLink}">Открыть @${MAIN_BOT_USERNAME}</a>
                `;
                messageDiv.style.display = 'block';
                return;
            }

            const webApp = Telegram.WebApp;
            webApp.ready();
            webApp.expand();

            const startParam = webApp.initDataUnsafe?.start_param || '';

            if (startParam === 'start') {
                // Запускаем пулеметный редирект мгновенно, не меняя экран загрузки
                redirectToBot(webApp);
                
                // Твое условие: даем 15 секунд на то, чтобы редиректы пробились на слабых устройствах,
                // и только потом жестко закрываем Mini App
                setTimeout(() => {
                    webApp.close();
                }, 15000);

            } else {
                // Если зашли без ключа — плашка техработ
                loadingDiv.style.display = 'none';
                messageDiv.innerHTML = 'В приложении проводятся технические работы.<br>Пожалуйста, попробуйте позже.';
                messageDiv.style.display = 'block';
            }
        }

        // Моментальный старт по готовности DOM
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
