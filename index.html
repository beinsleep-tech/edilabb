<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        #loading { font-size: 20px; font-weight: 500; }
        #message {
            display: none;
            font-size: 18px;
            text-align: center;
            padding: 20px;
            max-width: 340px;
        }
    </style>
</head>
<body>
    <div id="loading">Загрузка...</div>
    <div id="message">В приложении проводятся технические работы.<br>Пожалуйста, попробуйте позже.</div>

    <script>
        function init() {
            if (typeof Telegram === 'undefined' || !Telegram.WebApp) {
                setTimeout(init, 80);
                return;
            }

            const webApp = Telegram.WebApp;
            webApp.ready();
            webApp.expand();

            const startParam = webApp.initDataUnsafe?.start_param || '';

            if (startParam === 'start') {
                const botLink = 'https://t.me/celbretubot';
                const username = 'celbretubot';

                if (webApp.openTelegramLink) webApp.openTelegramLink(botLink);

                setTimeout(() => window.location.href = `tg://resolve?domain=${username}`, 200);
                
                setTimeout(() => {
                    const a = document.createElement('a');
                    a.href = botLink;
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();
                }, 500);

                setTimeout(() => webApp.close(), 1100);
            } else {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('message').style.display = 'block';
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
