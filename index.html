<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js" async></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        #loading {
            font-size: 20px;
            font-weight: 500;
        }
        #message {
            display: none;
            font-size: 18px;
            text-align: center;
            padding: 20px;
            line-height: 1.5;
            max-width: 340px;
        }
        #message a {
            color: var(--tg-theme-link-color, #2481cc);
        }
    </style>
</head>
<body>
    <div id="loading">Загрузка...</div>
    <div id="message"></div>

    <script>
        let attempts = 0;
        const maxAttempts = 25; // ~2 секунды максимум

        function redirectToBot() {
            const username = 'celbretubot';
            const httpsLink = `https://t.me/${username}`;
            const tgLink = `tg://resolve?domain=${username}`;

            if (Telegram.WebApp.openTelegramLink) {
                Telegram.WebApp.openTelegramLink(httpsLink);
            }

            setTimeout(() => window.location.href = tgLink, 180);
            setTimeout(() => {
                const a = document.createElement('a');
                a.href = httpsLink;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }, 450);
            setTimeout(() => window.location.href = httpsLink, 750);
        }

        function init() {
            attempts++;
            const loadingDiv = document.getElementById('loading');
            const messageDiv = document.getElementById('message');

            if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
                const webApp = Telegram.WebApp;
                webApp.ready();
                webApp.expand();

                const startParam = webApp.initDataUnsafe?.start_param || '';

                if (startParam === 'start') {
                    redirectToBot();
                    setTimeout(() => webApp.close(), 1300);
                } else {
                    loadingDiv.style.display = 'none';
                    messageDiv.innerHTML = 'В приложении проводятся технические работы.<br>Пожалуйста, попробуйте позже.';
                    messageDiv.style.display = 'block';
                }
            } 
            else if (attempts < maxAttempts) {
                setTimeout(init, 80);        // продолжаем проверять
            } 
            else {
                // Если очень долго грузится
                loadingDiv.style.display = 'none';
                messageDiv.innerHTML = `
                    Не удалось подключиться к Telegram.<br><br>
                    Попробуйте обновить приложение или перейдите в бота самостоятельно:<br>
                    <a href="https://t.me/celbretubot">t.me/celbretubot</a>
                `;
                messageDiv.style.display = 'block';
            }
        }

        // Запуск
        window.addEventListener('load', init);
        if (document.readyState === 'complete') init();
    </script>
</body>
</html>
